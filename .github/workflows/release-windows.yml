# Build Windows installers (NSIS .exe + MSI) and attach them to a GitHub Release when you push a version tag.
name: Release (Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build Tauri (NSIS + MSI)
        working-directory: apps/boardcad-desktop
        run: npx tauri build

      - name: Upload installers artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ripple-studio-windows-${{ github.sha }}
          path: |
            apps/boardcad-desktop/src-tauri/target/release/bundle/nsis/*
            apps/boardcad-desktop/src-tauri/target/release/bundle/msi/*
          if-no-files-found: error

      - name: Publish GitHub Release (version tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            apps/boardcad-desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/boardcad-desktop/src-tauri/target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
